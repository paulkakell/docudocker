services:
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      PING: 1
      POST: 0
      AUTH: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EVENTS: 0
      EXEC: 0
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SERVICES: 0
      SESSION: 0
      SWARM: 0
      SYSTEM: 0
      TASKS: 0
    ports:
      - "2375:2375"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  docudocker:
    build: .
    image: docudocker-webapp:01.00.00
    depends_on:
      - docker-socket-proxy
    ports:
      - "8080:8080"
    environment:
      DOCUDOCKER_DOCKER_MODE: http
      DOCUDOCKER_DOCKER_BASE_URL: http://docker-socket-proxy:2375
      DOCUDOCKER_BASIC_AUTH_USER: admin
      DOCUDOCKER_BASIC_AUTH_PASSWORD: change-me
